<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MergePoint – Team Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header id="navbar">
    <nav class="nav-container">

      <a href="#home" class="nav-logo" id="nav-logo">
        <span class="logo-mark">MP</span>
        <span class="logo-text">MergePoint</span>
      </a>

      <ul class="nav-links" id="nav-links">
        <!-- Rendered by app.js from data.json -->
      </ul>

      <button class="nav-cta" id="nav-cta">Contact Us</button>

      <button class="hamburger" id="hamburger" aria-label="Toggle menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

    </nav>
  </header>

  <div class="mobile-overlay" id="mobile-overlay">
    <ul class="mobile-nav-links" id="mobile-nav-links">
    </ul>
  </div>

  <main>
    <section id="team" class="team-section">
      <div class="team-container">
        <div class="section-header">
          <h2 class="section-title">Meet Our Team</h2>
          <p class="section-subtitle">The talented developers behind MergePoint</p>
        </div>
        <div class="team-grid" id="team-grid">
          <!-- Rendered by app.js from data.json -->
        </div>
      </div>
    </section>
  </main>

  <footer id="footer">
    <div class="footer-glow"></div>

    <div class="footer-container">
      <div class="footer-brand">
        <a href="#home" class="nav-logo footer-logo">
          <span class="logo-mark">MP</span>
          <span class="logo-text">MergePoint</span>
        </a>
        <p class="footer-tagline" id="footer-tagline">
        </p>
        <div class="footer-social" id="footer-social">
        </div>
      </div>

      <div class="footer-col">
        <h4 class="footer-col-title">Quick Links</h4>
        <ul class="footer-links" id="footer-nav-links">
        </ul>
      </div>

      <div class="footer-col">
        <h4 class="footer-col-title">Workshop</h4>
        <ul class="footer-info-list">
          <li><i class="fa-solid fa-code-branch"></i><span>Git Branching</span></li>
          <li><i class="fa-solid fa-code-pull-request"></i><span>Pull Requests</span></li>
          <li><i class="fa-solid fa-users"></i><span>Team Collaboration</span></li>
          <li><i class="fa-solid fa-arrows-merge"></i><span>Conflict Resolution</span></li>
        </ul>
      </div>

    </div>

    <div class="footer-bottom">
      <p class="footer-copy" id="footer-copy">
      </p>
      <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <i class="fa-solid fa-arrow-up"></i>
        <span>Back to top</span>
      </button>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
